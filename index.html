<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Creatief Portfolio</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Open+Sans&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Open Sans', sans-serif;
      background-color: #f8f5f0;
      color: #2c2c2c;
    }

    header {
      height: 90vh;
      background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      background: rgba(0,0,0,0.5);
      padding: 20px 40px;
      border-radius: 10px;
    }

    nav {
      position: sticky;
      top: 0;
      background: #ffffffdd;
      backdrop-filter: blur(10px);
      text-align: center;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #2c2c2c;
      font-weight: 600;
      letter-spacing: 1px;
    }

    nav a:hover {
      color: #8b6f47;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 40px 20px;
    }

    .section {
      margin-bottom: 60px;
    }

    .section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      margin-bottom: 20px;
    }

    .portfolio {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .project {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
    }

    .project img {
      width: 100%;
      display: block;
      transition: transform 0.5s;
    }

    .project:hover img {
      transform: scale(1.1);
    }

    .project .overlay {
      position: absolute;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      color: white;
      width: 100%;
      padding: 15px;
      opacity: 0;
      transition: 0.3s;
    }

    .project:hover .overlay {
      opacity: 1;
    }

    footer {
      text-align: center;
      padding: 25px;
      background-color: #1f1f1f;
      color: #d4cfc4;
    }
  </style>
</head>

<body>

<header>
  <h1>Jouw Naam</h1>
</header>

<nav>
  <a href="#over">Over</a>
  <a href="#werk">Werk</a>
  <a href="#contact">Contact</a>
</nav>

<div class="container">

  <div class="section" id="over">
    <h2>Over mij</h2>
    <p>
      This is where you will find some small updates on what I'm working on   
      Stay tuned for updates. This is where I'll put some random things which I enjoy. 
    </p>
  </div>

  <div class="section" id="werk">
    <h2>Mijn werk</h2>

    <div class="portfolio">

      <div class="project">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
        <div class="overlay">Project 1</div>
      </div>

      <div class="project">
        <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
        <div class="overlay">Project 2</div>
      </div>

      <div class="project">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
        <div class="overlay">Project 3</div>
      </div>

    </div>
  </div>

  <div class="section" id="contact">
    <h2>Contact</h2>
    <p>Email: steffontour@outlook.com </p>
  </div>

</div>

<footer>
  © 2026 – Steff on tour
</footer>

</body>
</html>
