<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Mijn Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Welkom op mijn website</h1>
  <p>Gemaakt met GitHub Pages 🚀</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Over mij</a>
  <a href="#">Projecten</a>
  <a href="#">Contact</a>
</nav>

<div class="container">

  <div class="card">
    <h2>Over mij</h2>
    <p>Hallo! Ik ben [jouw naam]. Dit is mijn eerste website.</p>
  </div>

  <div class="card">
    <h2>Mijn projecten</h2>
    <p>Hier komen later mijn projecten te staan.</p>
  </div>

  <div class="card">
    <h2>Contact</h2>
    <p>Email: jouw@email.com</p>
  </div>

</div>

<footer>
  <p>© 2026 Mijn Website</p>
</footer>

</body>
</html>
